name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 1. Generate Main Stats Card (with theme)
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&theme=radical
          path: profile/stats.svg
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      # 2. Generate Most Used Languages Card
      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=radical
          path: profile/langs.svg
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      # 3. Commit both SVGs back to the repo
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards with theme and languages" || exit 0
          git push
